<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AeroTrack">
<link rel="manifest" href="/manifest.json">
<title>AeroTrack ✈</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="app">

  <!-- ── Cabecera ──────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">✈</div>
      <div class="logo-text">AeroTrack</div>
    </div>
    <div id="liveCounter" class="live-counter" style="display:none"></div>
    <div class="header-right">
      <div class="api-badge" id="apiBadge">—</div>
      <button class="icon-btn" onclick="App.refresh()" title="Actualizar">↺</button>
    </div>
  </header>

  <!-- ── Buscador ──────────────────────────────────────────── -->
  <section class="search-section">
    <div class="search-bar" id="searchBar">
      <span class="search-icon">✦</span>
      <input
        class="search-input"
        id="searchInput"
        placeholder="Buscar vuelo: IBE6250, RYR1234…"
        maxlength="10"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="search-btn" id="searchBtn" onclick="App.search()">Buscar</button>
    </div>
    <div class="search-hint">IBE = Iberia · VLG = Vueling · RYR = Ryanair · EZY = easyJet</div>
  </section>

  <!-- ── Resultado búsqueda ─────────────────────────────────── -->
  <div class="result-card" id="resultCard" style="display:none"></div>

  <!-- ── Aeropuertos ───────────────────────────────────────── -->
  <section class="airport-section">
    <div class="section-header">
      <div class="section-title">Aeropuertos</div>
      <div class="live-pill"><span class="live-dot"></span>En vivo</div>
    </div>
    <div class="airport-scroll" id="airportScroll"></div>
  </section>

  <!-- ── Tabs ──────────────────────────────────────────────── -->
  <div class="tabs">
    <button class="tab active" data-tab="departures" onclick="App.switchTab(this,'departures')">✈ Salidas</button>
    <button class="tab"        data-tab="arrivals"   onclick="App.switchTab(this,'arrivals')">⬇ Llegadas</button>
    <button class="tab"        data-tab="live"       onclick="App.switchTab(this,'live')">🌍 En vivo</button>
  </div>

  <!-- ── Tablero de vuelos ─────────────────────────────────── -->
  <main class="board-section pb-nav">

    <!-- Cabecera del tablero (visible cuando hay datos) -->
    <div class="board-thead" id="boardHead" style="display:none">
      <span class="bth-flight">VUELO</span>
      <span class="bth-route">RUTA &nbsp;<span id="boardCount" class="board-count"></span></span>
      <span class="bth-time">HORA</span>
      <span class="bth-status">ESTADO</span>
    </div>

    <!-- Título + badge de refresco -->
    <div class="list-header">
      <div class="section-title" id="listTitle">Selecciona un aeropuerto</div>
      <div class="refresh-badge" id="refreshBadge"></div>
    </div>

    <!-- Lista de filas -->
    <div id="flightList"></div>

  </main>

</div><!-- /.app -->

<!-- ── Modal detalle ─────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="App.closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-drag-handle"></div>
  <div id="modalBody"></div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Navegación inferior ───────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="App.navTo('flights',this)">
    <span class="nav-icon">✈</span><span>Vuelos</span>
  </button>
  <button class="nav-item" onclick="App.focusSearch()">
    <span class="nav-icon">🔍</span><span>Buscar</span>
  </button>
  <button class="nav-item" onclick="App.navTo('map',this)">
    <span class="nav-icon">🗺</span><span>Mapa</span>
  </button>
  <button class="nav-item" onclick="App.navTo('settings',this)">
    <span class="nav-icon">⚙️</span><span>Config</span>
  </button>
</nav>

<script src="/js/app.js"></script>
</body>
</html>
