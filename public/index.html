<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AeroTrack">
<meta name="description" content="Real-time flight tracker powered by OpenSky Network">
<link rel="manifest" href="/manifest.json">
<title>AeroTrack ✈</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="app">

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">✈</div>
      <div class="logo-text">AeroTrack</div>
    </div>
    <div class="header-right">
      <div class="api-badge" id="apiBadge">—</div>
      <button class="icon-btn" onclick="App.refresh()" title="Refrescar">↺</button>
    </div>
  </header>

  <!-- ── Search ─────────────────────────────────────── -->
  <section class="search-section">
    <div class="search-bar" id="searchBar">
      <span class="search-icon">✦</span>
      <input
        class="search-input"
        id="searchInput"
        placeholder="Vuelo: IBE6250, VLG8103…"
        maxlength="10"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="search-btn" id="searchBtn" onclick="App.search()">Buscar</button>
    </div>
    <div class="search-hint">Usa el código ICAO: IBE (Iberia) · VLG (Vueling) · RYR (Ryanair)</div>
  </section>

  <!-- ── Search Result ──────────────────────────────── -->
  <div class="result-card" id="resultCard" style="display:none"></div>

  <!-- ── Airport Quick Select ───────────────────────── -->
  <section class="airport-section">
    <div class="section-header">
      <div class="section-title">Aeropuertos</div>
      <div class="live-pill"><span class="live-dot"></span>En vivo</div>
    </div>
    <div class="airport-scroll" id="airportScroll"></div>
  </section>

  <!-- ── Tabs ───────────────────────────────────────── -->
  <div class="tabs">
    <button class="tab active" data-tab="departures" onclick="App.switchTab(this,'departures')">✈ Salidas</button>
    <button class="tab" data-tab="arrivals" onclick="App.switchTab(this,'arrivals')">⬇ Llegadas</button>
    <button class="tab" data-tab="live" onclick="App.switchTab(this,'live')">🌍 Vuelos vivos</button>
  </div>

  <!-- ── Flight List ────────────────────────────────── -->
  <main class="flight-list-section pb-nav" id="mainContent">
    <div class="section-title" id="listTitle">Selecciona un aeropuerto</div>
    <div id="flightList"></div>
  </main>

</div>

<!-- ── Detail Modal ───────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="App.closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-drag-handle"></div>
  <div id="modalBody"></div>
</div>

<!-- ── Toast ──────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Bottom Nav ─────────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="App.navTo('flights',this)">
    <span class="nav-icon">✈</span><span>Vuelos</span>
  </button>
  <button class="nav-item" onclick="App.focusSearch()">
    <span class="nav-icon">🔍</span><span>Buscar</span>
  </button>
  <button class="nav-item" onclick="App.navTo('map',this)">
    <span class="nav-icon">🗺</span><span>Mapa</span>
  </button>
  <button class="nav-item" onclick="App.navTo('settings',this)">
    <span class="nav-icon">⚙️</span><span>Config</span>
  </button>
</nav>

<script src="/js/app.js"></script>
</body>
</html>
